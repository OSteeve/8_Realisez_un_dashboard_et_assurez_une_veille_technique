services:
  api:
    build: .
    container_name: fastapi_app
    command: uvicorn P8_api_fastapi:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: always

  dashboard:
    build: .
    container_name: streamlit_app
    command: streamlit run P8_api_streamlit.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    restart: always